version: 2

# ─────────────────────────────────────────────────────────────────────────────
# dbt Mesh — Public interface of the platform project (Fusion-conformant).
#
# Fusion enforcement:
#  - contract: enforced: true on ALL public models (required for Mesh)
#  - All data_type values use Databricks/Fusion type names
#  - Generic test arguments nested under arguments: key
#  - No :: cast syntax anywhere in this project
# ─────────────────────────────────────────────────────────────────────────────

models:

  - name: dim_customers
    description: >
      PUBLIC model. Customer dimension with LTV metrics and segmentation.
      Consumed by: marketing (segmentation), finance (revenue attribution).
      Contract enforced — column changes are a breaking change for all consumers.
      Column descriptions are persisted to Unity Catalog via dbt-databricks adapter,
      making them available to Genie without manual copy-paste.
    config:
      group: platform_core
      access: public
      contract:
        enforced: true
    columns:
      - name: customer_id
        description: "Unique customer identifier. Primary key."
        data_type: integer
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - not_null
          - unique

      - name: first_name
        description: "Customer first name."
        data_type: string

      - name: last_name
        description: "Customer last name."
        data_type: string

      - name: email
        description: "Lowercased customer email address."
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: created_date
        description: "Date the customer account was created."
        data_type: date

      - name: country
        description: "Uppercased two-letter ISO country code."
        data_type: string

      - name: number_of_orders
        description: "Total number of orders placed by this customer, regardless of status."
        data_type: integer

      - name: total_lifetime_value
        description: "Sum of all successful payment amounts for this customer (USD)."
        data_type: decimal

      - name: first_order_date
        description: "Date of the customer's first order."
        data_type: date

      - name: most_recent_order_date
        description: "Date of the customer's most recent order."
        data_type: date

      - name: customer_segment
        description: >
          Derived value tier based on total_lifetime_value.
          high_value: >= $500 | mid_value: $100–$499 | low_value: < $100.
          Tested with accepted_values — only these three values can exist.
        data_type: string
        tests:
          - accepted_values:
              arguments:
                values: ['high_value', 'mid_value', 'low_value']

  - name: dim_products
    description: >
      PUBLIC model. Product catalog dimension.
      Consumed by: finance (revenue by product/category).
      Contract enforced.
    config:
      group: platform_core
      access: public
      contract:
        enforced: true
    columns:
      - name: product_id
        description: "Unique product identifier. Primary key."
        data_type: integer
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - not_null
          - unique

      - name: product_name
        description: "Human-readable product name."
        data_type: string
        constraints:
          - type: not_null

      - name: category
        description: "Lowercased product category (apparel, electronics, fitness, footwear, nutrition)."
        data_type: string

      - name: unit_price
        description: "Current list price in USD."
        data_type: decimal

      - name: is_active
        description: "True if the product is currently available for purchase."
        data_type: boolean

  - name: fct_orders
    description: >
      PUBLIC model. Order fact table enriched with item counts and payment totals.
      Consumed by: finance (revenue), marketing (customer activity).
      Contract enforced — this is the canonical order grain for all downstream consumers.
    config:
      group: platform_core
      access: public
      contract:
        enforced: true
    columns:
      - name: order_id
        description: "Unique order identifier. Primary key."
        data_type: integer
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Foreign key to dim_customers."
        data_type: integer
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: order_date
        description: "Date the order was placed."
        data_type: date
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: status
        description: "Order lifecycle status. Valid values: placed, shipped, completed, returned."
        data_type: string
        tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned']

      - name: payment_method
        description: "Payment method used: credit_card, paypal, bank_transfer."
        data_type: string

      - name: number_of_items
        description: "Number of distinct line items in the order."
        data_type: integer

      - name: items_total
        description: "Sum of (quantity * unit_price) for all line items in the order (USD)."
        data_type: decimal

      - name: amount_paid
        description: >
          Total amount successfully paid for this order (USD).
          Counts only payments with status = 'success'.
          This is NOT the same as order amount — returns and failed payments are excluded.
        data_type: decimal
        tests:
          - not_null
